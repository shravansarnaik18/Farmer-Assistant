<!DOCTYPE html>
<html lang="{{ session.get('lang','en') }}">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height:100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4 text-success fw-bold">{{ title }}</h3>
                        <p>{{ message }}</p>
                        {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, msg in messages %}
                                <div class="alert alert-{{ 'danger' if category=='error' else 'success' }}" role="alert">
                                    {{ msg }}
                                </div>
                            {% endfor %}
                        {% endif %}
                        {% endwith %}
                        <form method="POST" action="{{ action }}">
                            <div class="mb-3">
                                <label class="form-label">{{ text.enter_otp }}</label>
                                <input type="text" name="otp" class="form-control" required>
                            </div>
                            {% if password_field %}
                            <div class="mb-3">
                                <label class="form-label">{{ text.new_password_label }}</label>
                                <input type="password" name="password" class="form-control" required minlength="6" title="Minimum 6 characters">
                            </div>
                            {% endif %}
                            <button type="submit" class="btn btn-primary w-100">{{ text.submit }}</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
