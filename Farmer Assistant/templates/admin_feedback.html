<!DOCTYPE html>
<html lang="{{ session.get('lang','en') }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ text.user_feedback }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light py-4">
    <div class="position-absolute top-0 end-0 p-2">
        <a href="/set_language/en" class="me-1">English</a>|
        <a href="/set_language/mr" class="mx-1">मराठी</a>|
        <a href="/set_language/hi" class="ms-1">हिंदी</a>
    </div>

    <div class="container mt-4">
        <a href="/admin/dashboard" class="btn btn-secondary mb-3">{{ text.back_to_admin_dashboard }}</a>
        <h2 class="mb-4">{{ text.user_feedback }}</h2>

        {% if feedbacks %}
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>User</th>
                    <th>Message</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for f in feedbacks %}
                <tr>
                    <td>{{ f["name"] }}</td>
                    <td>{{ f["message"] }}</td>
                    <td>{{ f["created_at"] }}</td>
                    <td>
                        <a href="/admin/delete_feedback/{{ f['id'] }}" class="btn btn-danger btn-sm"
                            onclick="return confirm('{{ text.delete_feedback_confirm }}')">
                            Delete
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <p>{{ text.no_feedback_available }}</p>
        {% endif %}
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
